services:

  postgres:
    image: postgres:16-alpine
    container_name: cheonha-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data                       # DB 데이터 영속화
      - ./docs/db/database.sql:/docker-entrypoint-initdb.d/init.sql  # 최초 1회 스키마 자동 실행
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cheonha-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}   # 호스트명 = 서비스명
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy    # DB 준비될 때까지 대기 후 기동
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cheonha-frontend
    ports:
      - "80:80"                       # 외부 진입점은 nginx 하나뿐
      - "443:443"
    volumes:
      - /home/ubuntu/certs:/etc/letsencrypt:ro   # 서버의 인증서를 읽기전용 마운트
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: