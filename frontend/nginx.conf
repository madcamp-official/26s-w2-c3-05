server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: 새로고침해도 index.html로 (React Router 대응)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → 백엔드 컨테이너
    location ~ ^/(auth|users|friends|notifications|rooms|health|topics|rankings) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (STOMP) → 업그레이드 헤더 필수
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # 게임 중 장시간 연결 유지
    }
}